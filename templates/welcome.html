<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Flask App</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .welcome-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .welcome-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            max-width: 480px;
            width: 100%;
            text-align: center;
            padding: 50px 40px;
            background: white;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .welcome-card h2 {
            font-weight: 700;
            color: #0d1b2a;
            font-size: 1.8rem;
        }

        .welcome-card p {
            color: #6c757d;
            font-size: 1rem;
            margin-top: 10px;
        }

        .username-badge {
            display: inline-block;
            background: linear-gradient(135deg, #0d1b2a, #1b4f72);
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin: 12px 0 24px;
        }

        .btn-home {
            background: linear-gradient(135deg, #0d1b2a, #1b4f72);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .btn-home:hover {
            opacity: 0.85;
            color: white;
        }

        footer {
            background-color: #0d1b2a;
            color: #aed6f1;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0d1b2a;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🌐 MIVA-CSC312 FlaskApp</a>
        </div>
    </nav>

    <!-- Welcome Card -->
    <div class="welcome-wrapper">
        <div class="welcome-card">
            <div class="success-icon">🎉</div>
            <h2>Account Created!</h2>
            <div class="username-badge">@{{ username }}</div>
            <p>
                Welcome aboard! Your account has been successfully registered.<br />
                Your password has been securely hashed and stored in the database.
            </p>
            <a href="{{ url_for('index') }}" class="btn-home mt-3">← Back to Home</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4">
        <p class="mb-0">&copy; 2025 FlaskApp &mdash; MIVA-CSC312 Web Application Development</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
